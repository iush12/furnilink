<div class="container d-flex align-items-center justify-content-center py-5 fade-in" style="min-height: 80vh;">
    <div class="glass-panel shadow-2xl rounded-4 overflow-hidden w-100 bg-white" style="max-width: 900px;">
        <div class="row g-0">
            <div class="col-md-6 d-none d-md-block bg-primary-custom text-white p-5 position-relative">
                <div class="position-absolute top-0 start-0 w-100 h-100 opacity-20"
                    style="background-image: url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=800&q=80'); background-size: cover; background-position: center;">
                </div>
                <div class="position-relative z-1 h-100 d-flex flex-column justify-content-center">
                    <h1 class="display-5 fw-bold mb-4">Welcome to FurniLink</h1>
                    <p class="lead opacity-75 mb-0">Experience the best in modern furniture shopping. Login to manage
                        your orders and view exclusive deals.</p>
                </div>
            </div>
            <div class="col-md-6 bg-white p-5">
                <div class="mb-5">
                    <h3 class="fw-bold text-primary-custom">Log In</h3>
                    <p class="text-muted">Nice to see you again! Please enter your details.</p>
                </div>

                <form (submit)="onSubmit()">
                    <div class="mb-3">
                        <label class="form-label fw-medium">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control form-control-lg border-start-0" [(ngModel)]="email"
                                name="email" required placeholder="name@example.com">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control form-control-lg border-start-0"
                                [(ngModel)]="password" name="password" required placeholder="••••••">
                        </div>
                    </div>

                    <div *ngIf="error" class="alert alert-danger mb-4 d-flex align-items-center"><i
                            class="bi bi-exclamation-circle-fill me-2"></i> {{ error }}</div>

                    <button type="submit" class="btn btn-primary-custom btn-lg w-100 mb-4 shadow"
                        [disabled]="isLoading">
                        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
                        {{ isLoading ? 'Checking credentials...' : 'Sign In' }}
                    </button>

                    <div class="text-center">
                        <span class="text-muted">Don't have an account?</span> <a routerLink="/register"
                            class="fw-bold text-secondary-custom text-decoration-none ms-1">Sign up for free</a>

                        <div class="mt-4 pt-4 border-top">
                            <p class="small text-muted mb-2 text-uppercase fw-bold" style="font-size: 0.7rem;">Quick
                                Demo Login</p>
                            <div class="d-flex justify-content-center gap-2">
                                <button type="button" class="btn btn-outline-dark btn-sm rounded-pill px-3"
                                    (click)="email='user@example.com'; password='password'">Customer Demo</button>
                                <button type="button" class="btn btn-outline-danger btn-sm rounded-pill px-3"
                                    (click)="email='admin@courts.com'; password='password'">Admin Demo</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
