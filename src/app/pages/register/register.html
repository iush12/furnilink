<div class="container d-flex align-items-center justify-content-center py-5 fade-in" style="min-height: 80vh;">
    <div class="glass-panel shadow-2xl rounded-4 overflow-hidden w-100 bg-white" style="max-width: 900px;">
        <div class="row g-0">
            <div class="col-md-6 bg-white p-5">
                <div class="mb-5">
                    <h3 class="fw-bold text-primary-custom">Create Account</h3>
                    <p class="text-muted">Join FurniLink today for exclusive benefits.</p>
                </div>

                <form (submit)="onSubmit()">
                    <div class="mb-3">
                        <label class="form-label fw-medium">Full Name</label>
                        <input type="text" class="form-control form-control-lg" [(ngModel)]="user.name" name="name"
                            required placeholder="John Doe">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Email Address</label>
                        <input type="email" class="form-control form-control-lg" [(ngModel)]="user.email" name="email"
                            required placeholder="name@example.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Password</label>
                        <input type="password" class="form-control form-control-lg" [(ngModel)]="user.password"
                            name="password" required placeholder="••••••">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium">Address (Optional)</label>
                        <textarea class="form-control" [(ngModel)]="user.address" name="address" rows="2"
                            placeholder="For faster checkout..."></textarea>
                    </div>

                    <div *ngIf="error" class="alert alert-danger mb-4">{{ error }}</div>

                    <button type="submit" class="btn btn-primary-custom btn-lg w-100 mb-4 shadow"
                        [disabled]="isLoading">
                        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
                        {{ isLoading ? 'Creating Account...' : 'Register' }}
                    </button>

                    <div class="text-center">
                        <span class="text-muted">Already have an account?</span> <a routerLink="/login"
                            class="fw-bold text-secondary-custom text-decoration-none ms-1">Log in</a>
                    </div>
                </form>
            </div>
            <div class="col-md-6 d-none d-md-block bg-secondary-custom text-white p-5 position-relative">
                <div class="position-absolute top-0 start-0 w-100 h-100 opacity-20"
                    style="background-image: url('https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&w=800&q=80'); background-size: cover; background-position: center;">
                </div>
                <div class="position-relative z-1 h-100 d-flex flex-column justify-content-center">
                    <h1 class="display-5 fw-bold mb-4">Furnish Your Dream Home</h1>
                    <ul class="list-unstyled lead opacity-90">
                        <li class="mb-3"><i class="bi bi-check-circle-fill me-2"></i> Exclusive Member Discounts</li>
                        <li class="mb-3"><i class="bi bi-check-circle-fill me-2"></i> Track Your Orders</li>
                        <li class="mb-3"><i class="bi bi-check-circle-fill me-2"></i> Faster Checkout</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
