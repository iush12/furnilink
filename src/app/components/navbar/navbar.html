<nav class="navbar navbar-expand-lg fixed-top glass-panel px-lg-4 py-3">
    <div class="container-fluid">
        <a class="navbar-brand d-flex flex-column lh-1" routerLink="/">
            <span class="fs-3 fw-bold text-primary-custom" style="letter-spacing: -1px;">FurniLink</span>
            <span class="fs-7 text-secondary-custom fw-medium text-uppercase pt-1"
                style="font-size: 0.75rem; letter-spacing: 1px;">by COURTS Malaysia</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0 fw-medium">
                <li class="nav-item">
                    <a class="nav-link px-3" routerLink="/" routerLinkActive="text-secondary-custom"
                        [routerLinkActiveOptions]="{exact: true}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3" routerLink="/shops" routerLinkActive="text-secondary-custom">Nearest
                        Shop</a>
                </li>
                <ng-container *ngIf="currentUser$ | async as user">
                    <li class="nav-item">
                        <a class="nav-link px-3" routerLink="/orders" routerLinkActive="text-secondary-custom">My
                            Orders</a>
                    </li>
                    <li class="nav-item" *ngIf="user.role === 'admin'">
                        <a class="nav-link px-3 text-danger" routerLink="/admin"
                            routerLinkActive="text-danger fw-bold">Admin Panel</a>
                    </li>
                </ng-container>
            </ul>
            <div class="d-flex align-items-center gap-2">
                <form class="d-none d-lg-flex me-3" role="search" action="#" onsubmit="return false;">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                        <input class="form-control border-start-0 ps-0" type="search" placeholder="Search furniture..."
                            aria-label="Search">
                    </div>
                </form>

                <ng-container *ngIf="currentUser$ | async as user; else loginTemplate">
                    <div class="dropdown">
                        <button class="btn btn-light d-flex align-items-center gap-2" type="button" id="userDropdown"
                            data-bs-toggle="dropdown" aria-expanded="false">
                            <div class="bg-primary-custom text-white rounded-circle d-flex align-items-center justify-content-center"
                                style="width: 32px; height: 32px;">
                                {{ user.name.charAt(0) }}
                            </div>
                            <span class="d-none d-md-block">{{ user.name }}</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0" aria-labelledby="userDropdown">
                            <li><a class="dropdown-item" routerLink="/orders">Orders</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><button class="dropdown-item text-danger" (click)="logout()">Logout</button></li>
                        </ul>
                    </div>
                </ng-container>
                <ng-template #loginTemplate>
                    <a routerLink="/login" class="btn btn-outline-dark border-0">Log In</a>
                    <a routerLink="/register" class="btn btn-primary-custom shadow-sm">Sign Up</a>
                </ng-template>
            </div>
        </div>
    </div>
</nav>
<!-- Spacer for fixed navbar -->
<div style="height: 88px;"></div>
